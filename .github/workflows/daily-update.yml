name: Daily Data Update

on:
  schedule:
    # Run every day at 06:00 UTC = 11:30 AM IST
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

env:
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY:  ${{ secrets.EIA_API_KEY }}

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      # ── Step 1: Fetch live data (all continue-on-error so one bad source doesn't abort) ──

      - name: Fetch Brent crude price (FRED / EIA)
        run: python pipeline/fetch_oil_prices.py
        continue-on-error: true

      - name: Fetch exchange rates (ECB — free, no key)
        run: python pipeline/fetch_exchange_rates.py
        continue-on-error: true

      - name: Fetch US economic indicators (FRED)
        run: python pipeline/fetch_fred_data.py
        continue-on-error: true

      # ── Step 2: Compute country-level metrics ──────────────────────────────

      - name: Compute household costs and currency changes
        run: python pipeline/compute_household_costs.py
        env:
          PYTHONPATH: pipeline

      # ── Step 3: Validate all data ─────────────────────────────────────────

      - name: Validate pipeline outputs
        run: python pipeline/merge_and_validate.py

      # ── Step 4: Generate the dashboard JSON consumed by index.html ────────

      - name: Generate country_data.json for dashboard
        run: python pipeline/generate_dashboard_json.py

      # ── Step 5: Commit updated data files and push to main ────────────────
      # GitHub Pages auto-deploys on every push to main — no separate deploy step needed.

      - name: Commit and push updated data
        run: |
          git config user.name  "War Impact Observatory Bot"
          git config user.email "bot@warimpactobservatory.org"
          git add data/
          git diff --staged --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push
